<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Venkat's File Share</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="avatar">V</div>
      <div class="header-text">
        <h1>Welcome, Venkat! 👋</h1>
        <p class="subtitle">Your Personal File Sharing Hub</p>
      </div>
    </div>

    <div class="card">
      <div class="upload-section">
        <h2>📤 Upload Files</h2>
        <p class="section-desc">Share files with devices on your local network</p>
        <div class="input-row">
          <label for="fileInput" class="file-label">
            <span class="file-icon">📎</span>
            <span id="fileName">Choose a file...</span>
          </label>
          <input type="file" id="fileInput" style="display: none;" />
          <button onclick="uploadFile()" class="upload-btn">Upload</button>
        </div>
      </div>

      <div class="files-section">
        <div class="section-header">
          <h2>📁 Your Shared Files</h2>
          <span id="fileCount" class="file-count">0 files</span>
        </div>
        <div id="fileList" class="file-list"></div>
      </div>
    </div>

    <div class="footer">
      <p>Built by Venkat • Custom HTTP Server from Scratch</p>
      <p class="footer-sub">Local Network File Sharing</p>
    </div>
  </div>

  <script>
    const API = "";

    // Update file name display when file is selected
    document.getElementById("fileInput").addEventListener("change", function(e) {
      const fileName = e.target.files[0]?.name || "Choose a file...";
      document.getElementById("fileName").textContent = fileName.length > 30 
        ? fileName.substring(0, 30) + "..." 
        : fileName;
    });

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    function loadFiles() {
      fetch(API + "/files")
        .then(res => res.json())
        .then(files => {
          const list = document.getElementById("fileList");
          const countEl = document.getElementById("fileCount");
          list.innerHTML = "";

          countEl.textContent = files.length === 1 ? "1 file" : `${files.length} files`;

          if (files.length === 0) {
            list.innerHTML = '<div class="empty-state"><div class="empty-icon">📂</div><p class="no-files">No files shared yet</p><p class="empty-hint">Upload your first file to get started!</p></div>';
            return;
          }

          files.forEach(file => {
            const div = document.createElement("div");
            div.className = "file-item";
            div.innerHTML = `
              <div class="file-info">
                <div class="file-icon-large">📄</div>
                <div class="file-details">
                  <span class="file-name">${file.name}</span>
                  <span class="file-size">${formatFileSize(file.size)}</span>
                </div>
              </div>
              <div class="file-actions">
                <button class="download-btn" onclick="downloadFile('${file.name}')" title="Download">
                  ⬇️ Download
                </button>
                <button class="delete-btn" onclick="deleteFile('${file.name}')" title="Delete">
                  🗑️ Delete
                </button>
              </div>
            `;
            list.appendChild(div);
          });
        })
        .catch(err => {
          console.error("Load error:", err);
          document.getElementById("fileList").innerHTML = '<p class="error">❌ Error loading files</p>';
        });
    }

    function uploadFile() {
      const input = document.getElementById("fileInput");
      const file = input.files[0];
      
      if (!file) {
        alert("Please select a file first!");
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const content = e.target.result;
        let base64Content = content;
        if (content.includes(",")) {
          base64Content = content.split(",")[1];
        }

        fetch(API + "/upload", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            filename: file.name,
            content: base64Content
          })
        })
        .then(res => {
          if (!res.ok) {
            return res.text().then(text => {
              try {
                const err = JSON.parse(text);
                throw new Error(err.error || "Upload failed");
              } catch {
                throw new Error(text || "Upload failed");
              }
            });
          }
          return res.json();
        })
        .then(data => {
          input.value = "";
          document.getElementById("fileName").textContent = "Choose a file...";
          loadFiles();
          console.log("Upload successful:", data);
        })
        .catch(err => {
          console.error("Upload error:", err);
          alert("Error uploading file: " + err.message);
        });
      };
      reader.readAsDataURL(file);
    }

    function downloadFile(filename) {
      fetch(API + "/files/" + encodeURIComponent(filename) + "?download=true")
        .then(res => {
          if (!res.ok) throw new Error("Download failed");
          return res.arrayBuffer();
        })
        .then(buffer => {
          const blob = new Blob([buffer], { type: 'application/octet-stream' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        })
        .catch(err => {
          console.error("Download error:", err);
          alert("Error downloading file");
        });
    }

    function deleteFile(filename) {
      if (!confirm(`Are you sure you want to delete "${filename}"?`)) {
        return;
      }

      fetch(API + "/files/" + encodeURIComponent(filename), {
        method: "DELETE"
      })
        .then(() => loadFiles())
        .catch(err => {
          console.error("Delete error:", err);
          alert("Error deleting file");
        });
    }

    loadFiles();
  </script>
</body>
</html>
